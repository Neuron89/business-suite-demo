services:
  employee-tech-doc:
    build:
      context: .
      dockerfile: Dockerfile
    image: employee-tech-doc:latest
    container_name: employee-tech-doc
    restart: unless-stopped
    ports:
      - "5065:5065"
    environment:
      DATABASE_URL: sqlite:////app/data/employee_assets.db
      EXPORT_DIR: /app/exports
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./exports:/app/exports

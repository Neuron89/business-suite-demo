# =============================================================================
# Acme Industries Business Suite — Demo (self-hosted, public)
#
# Local:   docker compose up -d --build      (reach via Caddy on :${HTTP_PORT:-8080})
# Public:  docker compose --profile tunnel up -d --build   (adds the Cloudflare tunnel)
#
# Every app is reachable ONLY through the `caddy` reverse proxy, one subdomain
# per app under ${DEMO_DOMAIN} (default demo.haydennester.com). No per-app host
# ports are published, so this can run next to other apps without collisions.
# =============================================================================

services:

  # ----------------------------------------------------------------- postgres
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------- caddy (reverse proxy)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DEMO_DOMAIN: ${DEMO_DOMAIN:-demo.haydennester.com}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - portal

  # ----------------------------------------------------------------- cloudflared (public tunnel)
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - caddy
    profiles: ["tunnel"]

  # ----------------------------------------------------------------- portal
  portal:
    build: ./apps/portal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4070"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: portal_db
      DB_USER: demo
      DB_PASSWORD: demo
      JWT_SECRET: ${JWT_SECRET:-demo-jwt-secret}
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      DEMO_MODE: "true"
      # Browser-facing URLs for SSO redirects (public subdomains)
      CLIENT_URL: https://${DEMO_DOMAIN:-demo.haydennester.com}
      MOC_URL: https://moc.${DEMO_DOMAIN:-demo.haydennester.com}
      IT_REQUEST_URL: https://it.${DEMO_DOMAIN:-demo.haydennester.com}
      SHIPPING_URL: https://ship.${DEMO_DOMAIN:-demo.haydennester.com}
      QC_LAB_URL: https://qc.${DEMO_DOMAIN:-demo.haydennester.com}
      IQMS_CHAT_URL: https://chat.${DEMO_DOMAIN:-demo.haydennester.com}
      EMPLOYEE_DB_URL: https://dir.${DEMO_DOMAIN:-demo.haydennester.com}
      COMPLAINT_URL: https://complaints.${DEMO_DOMAIN:-demo.haydennester.com}
      SDS_PORTAL_URL: https://sds.${DEMO_DOMAIN:-demo.haydennester.com}
      ONBOARDING_URL: https://onboarding.${DEMO_DOMAIN:-demo.haydennester.com}
      # Server-side URLs for task aggregation (internal docker network)
      MOC_API_BASE: http://moc:4000
      IT_REQUEST_API_BASE: http://it-request:4020
      DIRECTORY_BASE_URL: http://employee-directory:5065

  # ----------------------------------------------------------------- moc
  moc:
    build: ./apps/moc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: moc_db
      DB_USER: demo
      DB_PASSWORD: demo
      JWT_SECRET: ${JWT_SECRET_MOC:-demo-jwt-secret-moc}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET_MOC:-demo-jwt-refresh-secret-moc}
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      INTEGRATION_API_KEY: demo-integration-key
      CLIENT_URL: https://moc.${DEMO_DOMAIN:-demo.haydennester.com}
      DEMO_MODE: "true"
      ALLOW_PASSWORD_LOGIN: "true"

  # ----------------------------------------------------------------- it-request
  it-request:
    build: ./apps/it-request
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4020"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: it_request_db
      DB_USER: demo
      DB_PASSWORD: demo
      JWT_SECRET: ${JWT_SECRET_IT:-demo-jwt-secret-it}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET_IT:-demo-jwt-refresh-secret-it}
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      CLIENT_URL: https://it.${DEMO_DOMAIN:-demo.haydennester.com}
      DEMO_MODE: "true"
      ALLOW_PASSWORD_LOGIN: "true"
      ALLOW_TEST_LOGIN: "true"

  # ----------------------------------------------------------------- shipping
  shipping:
    build: ./apps/shipping
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4030"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: shipping_db
      DB_USER: demo
      DB_PASSWORD: demo
      JWT_SECRET: ${JWT_SECRET_SHIPPING:-demo-jwt-secret-shipping}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET_SHIPPING:-demo-jwt-refresh-secret-shipping}
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      CLIENT_URL: https://ship.${DEMO_DOMAIN:-demo.haydennester.com}
      DEMO_MODE: "true"

  # ----------------------------------------------------------------- qc-lab
  qc-lab:
    build: ./apps/qc-lab
    restart: unless-stopped
    environment:
      SECRET_KEY: demo-qc-lab-secret
      DATABASE_URL: sqlite:////app/data/qc_lab.db
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      DEMO_MODE: "true"
    volumes:
      - qcdata:/app/data

  # ----------------------------------------------------------------- iqms-chat
  iqms-chat:
    build: ./apps/iqms-chat
    restart: unless-stopped
    environment:
      SECRET_KEY: demo-iqms-chat-secret
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      DEMO_MODE: "true"

  # ----------------------------------------------------------------- employee-directory
  employee-directory:
    build: ./apps/employee-directory
    restart: unless-stopped
    environment:
      SECRET_KEY: demo-edir-secret
      DATABASE_URL: sqlite:////app/data/employee_assets.db
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      DEMO_MODE: "true"
      APP_ADMIN_USERS: "demo:demo"
      SESSION_COOKIE_SECURE: "false"
    volumes:
      - edirdata:/app/data

  # ----------------------------------------------------------------- complaint-tracker
  complaint-tracker:
    build: ./apps/complaint-tracker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4010"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: complaint_db
      DB_USER: demo
      DB_PASSWORD: demo
      JWT_SECRET: ${JWT_SECRET_COMPLAINT:-demo-jwt-secret-complaint}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET_COMPLAINT:-demo-jwt-refresh-secret-complaint}
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      CLIENT_URL: https://complaints.${DEMO_DOMAIN:-demo.haydennester.com}
      DEMO_MODE: "true"
      ALLOW_PASSWORD_LOGIN: "true"

  # ----------------------------------------------------------------- onboarding-system
  onboarding-system:
    build: ./apps/onboarding-system
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: onboarding_db
      DB_USER: demo
      DB_PASSWORD: demo
      JWT_SECRET: ${JWT_SECRET_ONBOARDING:-demo-jwt-secret-onboarding}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET_ONBOARDING:-demo-jwt-refresh-secret-onboarding}
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      CLIENT_URL: https://onboarding.${DEMO_DOMAIN:-demo.haydennester.com}
      DIRECTORY_BASE_URL: http://employee-directory:5065
      DEMO_MODE: "true"
      ALLOW_PASSWORD_LOGIN: "true"
      ALLOW_TEST_LOGIN: "true"

  # ----------------------------------------------------------------- sds-portal
  sds-portal:
    build: ./apps/sds-portal
    restart: unless-stopped
    environment:
      SECRET_KEY: demo-sds-secret
      DATABASE_URL: sqlite:////app/data/sds_portal.db
      PORTAL_SSO_SECRET: ${PORTAL_SSO_SECRET:-demo-sso-shared-secret}
      DEMO_MODE: "true"
      SESSION_COOKIE_SECURE: "false"
    volumes:
      - sdsdata:/app/data

volumes:
  pgdata:
  qcdata:
  edirdata:
  sdsdata:
